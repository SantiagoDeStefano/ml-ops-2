name: CI/CD Pipeline

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements/requirements.gateway.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/test_gateway.py --cov=gateway --cov-fail-under=80

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    environment: ML_OPS_ENVIRONMENTS
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Pull model from MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          pip install mlflow boto3
          python scripts/pull_model.py

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push predictor
        run: |
          docker build -f src/app/Dockerfile.main -t khoinguyenpham/review-sentiment:latest .
          docker push khoinguyenpham/review-sentiment:latest

      - name: Build and push gateway
        run: |
          docker build -f src/app/Dockerfile.gateway -t khoinguyenpham/fastapi-gateway:latest .
          docker push khoinguyenpham/fastapi-gateway:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ML_OPS_ENVIRONMENTS
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws eks update-kubeconfig --name eks-ap-southeast-1 --region ap-southeast-1
          aws eks create-access-entry \
            --cluster-name eks-ap-southeast-1 \
            --principal-arn arn:aws:iam::528471665809:user/eks-admin \
            --type STANDARD \
            --region ap-southeast-1 || true
          aws eks associate-access-policy \
            --cluster-name eks-ap-southeast-1 \
            --principal-arn arn:aws:iam::528471665809:user/eks-admin \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region ap-southeast-1 || true

      - name: Create secrets
        run: |
          kubectl create secret generic s3-credentials \
            --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -
          
          kubectl create secret generic s3-credentials \
            --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -n mlflow \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -
          
          echo '${{ secrets.BASIC_AUTH_PASSWORD }}' | htpasswd -ci auth admin
          kubectl create secret generic basic-auth --from-file=auth \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Install Helmfile
        run: |
          curl -LO https://github.com/helmfile/helmfile/releases/download/v1.3.2/helmfile_1.3.2_linux_amd64.tar.gz
          tar xzf helmfile_1.3.2_linux_amd64.tar.gz
          sudo mv helmfile /usr/local/bin/

      - name: Deploy with Helmfile
        run: |
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl patch configmap config-features -n knative-serving --type merge -p '{"data":{"kubernetes.podspec-init-containers":"enabled"}}'
          kubectl patch configmap config-network -n knative-serving --type merge -p '{"data":{"ingress-class":"kourier.ingress.knative.dev"}}'
          helmfile sync